name: Ansible Full Lint (Win/Lin)

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Подготовка Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 2. Установка Python-библиотек для работы с WinRM и Windows
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ansible-core ansible-lint pywinrm xmltodict

      # 3. Установка коллекций из requirements.yml
      - name: Install Ansible Collections
        run: |
          ansible-galaxy collection install -r collections/requirements.yml

      # 4. Финальный запуск линтера (теперь он видит ВСЕ модули)
      - name: Run ansible-lint
        run: |
          ansible-lint .

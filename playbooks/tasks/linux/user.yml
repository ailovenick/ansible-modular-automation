- name: "[Linux] Состояние учетной записи test-user"
  ansible.builtin.user:
    name: test-user
    comment: "Пользователь для управления веб-сервером"
    shell: /bin/bash
    create_home: yes
    password: "{{ vault_user_password | password_hash('sha512') }}"
    state: present
# для корректной передачи пароля необходима библиотека passlib на ansible контроллере / pip install passlib

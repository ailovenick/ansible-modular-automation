- name: "[Windows] Состояние системных компонентов для диагностики и управления"
  ansible.windows.win_feature:
    name: "{{ item.name }}"
    state: present
  loop:
    - { name: "Telnet-Client", description: "Инструмент проверки портов" }
    - { name: "RSAT-AD-PowerShell", description: "Средства администрирования AD" }
  register: feature_result

- name: "[Windows] Контроль необходимости перезагрузки"
  ansible.builtin.debug:
    msg: "Требуется перезагрузка для: {{ item.item.name }}"
  when: item.reboot_required | default(false)
  loop: "{{ feature_result.results }}"


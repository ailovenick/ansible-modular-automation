all:
  children:
    # --- Секция Linux ---
    lin_servers:
      hosts:
        lin1:
          ansible_host: 192.168.1.32
          ansible_connection: ssh
          ansible_port: 22
          ansible_user: admin
          ansible_ssh_pass: "{{ vault_ansible_password }}"
        localhost:
          ansible_connection: local
        # ПРИМЕР: Доступ по SSH-ключу (рекомендуется)
        # lin2:
        #   ansible_host: 192.168.1.33
        #   ansible_connection: ssh
        #   ansible_port: 22
        #   ansible_user: admin
        #   ansible_ssh_private_key_file: "~/.ssh/id_rsa"
      vars:
        # Пароль для повышения привилегий (sudo) на Linux
        ansible_become_password: "{{ vault_ansible_become_password }}"

    # --- Секция Windows ---
    win_servers:
      children:
        # Группа 1: Локальные пользователи (Workgroup)
        win_local:
          hosts:
            win-workstation1:
              ansible_host: 192.168.1.111
              ansible_user: local-admin
              ansible_password: "{{ vault_ansible_password }}"
            win-workstation2:
              ansible_host: 192.168.1.112
              ansible_user: local-admin
              ansible_password: "{{ vault_ansible_password }}"
          vars:
            ansible_connection: winrm
            ansible_port: 5986
            ansible_winrm_transport: ntlm
            ansible_winrm_server_cert_validation: ignore
            # Обязательно для Windows (sudo не поддерживается)
            ansible_become_method: runas

        # Группа 2: Доменные пользователи (Active Directory) - ПРИМЕР
        # win_domain:
        #   hosts:
        #     win-server1:
        #       ansible_host: 10.0.5.10
        #       ansible_user: "username@DOMAIN.COM"
        #       ansible_password: "SecretPassword"
        #     win-server2:
        #       ansible_host: 10.0.5.11
        #       ansible_user: "username@DOMAIN.COM"
        #       ansible_password: "SecretPassword"
        #   vars:
        #     ansible_connection: winrm
        #     ansible_port: 5986
        #     ansible_winrm_transport: kerberos
        #     ansible_winrm_server_cert_validation: ignore
        #     ansible_winrm_realm: "DOMAIN.COM"
        #     ansible_become_method: runas

    # Группа для всех серверов (Linux + Windows)
    lin_win_servers:
      children:
        lin_servers: {}
        win_servers: {}
